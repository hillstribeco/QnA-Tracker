[build]
  publish = "public"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# A strict Content-Security-Policy is intentionally not enabled yet because
# this prototype still uses inline scripts/styles and CDN scripts. Add CSP after
# splitting frontend code into separate files.
